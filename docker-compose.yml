services:
  app:
    build:
      context: ./docker/php/
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    networks:
      - laravel
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-laravel_local}
      - DB_USERNAME=${DB_USER:-phper}
      - DB_PASSWORD=${DB_PASS:-secret}


  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    networks:
      - laravel

  webserver:
    image: nginx:alpine
    container_name: laravel_web
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - laravel
    depends_on:
      - app


  db:
    image: ciuster/laravel_db
    #    ports:
    #      - target: 3306
    #        published: ${DB_PORT:-3306}
    #        protocol: tcp
    #        mode: host
    volumes:
      - type: volume
        source: db-store
        target: /var/lib/mysql

    #    volumes:
    #      - type: bind
    #        source: ../data/mysql
    #        target: /var/lib/mysql
    environment:
      - MYSQL_DATABASE=${DB_NAME:-laravel_local}
      - MYSQL_USER=${DB_USER:-phper}
      - MYSQL_PASSWORD=${DB_PASS:-secret}
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-secret}
    networks:
      - laravel

  adminer:
    image: adminer
    restart: always
    ports:
      - target: 8080
        published: ${ADMINER_PORT:-8080}
        protocol: tcp
        mode: host
    networks:
      - laravel
    depends_on:
      - db



